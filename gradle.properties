kotlin.stdlib.default.dependency=false
# We compile with the installed JDK 21 but emit Java 17 bytecode (see build.gradle.kts) so the plugin
# loads on the JBR 17 of 2022.2+. compileJava is NO-SOURCE (no .java files), so the Kotlin/Java
# jvm-target consistency check is moot — downgrade it from error to warning so the 21-compiler /
# 17-target split doesn't fail the build. (If .java sources are ever added, realign the targets.)
kotlin.jvm.target.validation.mode=warning
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC
org.gradle.parallel=true
